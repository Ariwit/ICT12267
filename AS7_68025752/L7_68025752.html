</head>
<body>

  <nav class="navbar navbar-expand-lg navbar-dark custom-navbar fixed-top">
  <div class="container-fluid">

    <a class="navbar-brand fw-bold" href="#">
      Ariwit Triwittayakul
    </a>

    <button class="navbar-toggler" type="button"
      data-bs-toggle="collapse"
      data-bs-target="#navbarNav">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
      <ul class="navbar-nav">
        <li class="nav-item">
          <a class="nav-link active" href="#">หน้าแรก</a>

          <a class="nav-link" href="#">บริการ</a>

          <a class="nav-link" href="#">เกี่ยวกับเรา</a>
        </li>

  </div>
</nav>

    <div class="video-container">
    <video autoplay loop muted>
    <source src="leaves.mp4" type="video/mp4">
    </video>
    </div>

    <div class="form-container">
  <h2 class="text-center mb-4">แบบฟอร์มลงทะเบียน</h2>

  <form action="#" method="post">

    <div class="mb-3">
      <label for="fullname" class="form-label">ชื่อ-นามสกุล</label>
      <input type="text" class="form-control" id="fullname" name="fullname"
        placeholder="กรุณากรอกชื่อ-นามสกุล" required>
    </div>

    <div class="mb-3">
      <label for="email" class="form-label">อีเมล</label>
      <input type="email" class="form-control" id="email" name="email"
        placeholder="example@domain.com" required>
    </div>

    <div class="mb-3">
      <label for="password" class="form-label">รหัสผ่าน</label>
      <input type="password" class="form-control" id="password" name="password" required>
    </div>

    <div class="mb-3">
      <label class="form-label d-block">เพศ</label>

      <div class="form-check form-check-inline">
        <input class="form-check-input" type="radio" name="gender" id="male" value="male">
        <label class="form-check-label" for="male">ชาย</label>
      </div>

      <div class="form-check form-check-inline">
        <input class="form-check-input" type="radio" name="gender" id="female" value="female">
        <label class="form-check-label" for="female">หญิง</label>
      </div>
    </div>

    <div class="mb-3">
      <label class="form-label">ตำแหน่ง</label>
      <select class="form-select" name="position" required>
        <option value="" selected disabled>เลือกตำแหน่ง</option>
        <option>Web Development</option>
        <option>Mobile App</option>
        <option>Manager</option>
        <option>Developer</option>
        <option>Designer</option>
        <option>Marketing</option>
      </select>
    </div>

    <div class="d-flex gap-3">
  <button type="submit" class="btn btn-success w-50">ลงทะเบียน</button>
  <button type="reset" class="btn btn-danger w-50">ล้างข้อมูล</button>
</div>

 <div class="video-controls">
    <button id="playBtn" class="btn btn-warning btn-sm me-2">Play</button>
    <button id="pauseBtn" class="btn btn-danger btn-sm">Pause</button>
  </div>

</div>

  </form>
</div>
<script src="L7.js"></script>
